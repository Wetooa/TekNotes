<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.0.3/dist/tailwind.min.css" rel="stylesheet">
    <style>
        .alert {
            padding: 15px;
            margin-bottom: 20px;
            border: 1px solid transparent;
            border-radius: 4px;
        }
        .alert-success { color: #3c763d; background-color: #dff0d8; border-color: #d6e9c6; }
        .alert-error { color: #a94442; background-color: #f2dede; border-color: #ebccd1; }
    </style>
</head>
<body id="main" class="bg-gray-100">
    {% if messages %}
    <div id="message-container">
        {% for message in messages %}
            <div id="message" class="alert alert-{{ message.tags }}">
                {{ message }}
            </div>
        {% endfor %}
    </div>
    {% endif %}

<div id="login-container" class="min-h-screen flex items-center justify-center">
    <div id="form-container" class="bg-white p-8 rounded-lg shadow-lg w-full max-w-md">
        <h2 id="login-title" class="text-2xl font-bold mb-5 text-center">Login</h2>
        <form action="" method="POST">
            {% csrf_token %}
            <div id="username-or-email-field" class="mb-4">
                <label for="username_or_email" class="block text-gray-700 text-sm font-bold mb-2">Username or Email</label>
                <input id="username_or_email" type="text" name="username_or_email" class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline">
            </div>

            <div id="password-field" class="mb-6">
                <label for="password" class="block text-gray-700 text-sm font-bold mb-2">Password</label>
                <input id="password" type="password" name="password" class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 mb-3 leading-tight focus:outline-none focus:shadow-outline">
            </div>

            <div id="actions" class="flex items-center justify-between">
                <button type="submit" class="bg-blue-500 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded focus:outline-none focus:shadow-outline">Log In</button>
                <a href="/register_user" class="inline-block align-baseline font-bold text-sm text-blue-500 hover:text-blue-800">Register</a>
            </div>
        </form>
    </div>
</div>

</body>
</html>
